<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CFC00" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#39c5cf" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#7CFC00" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <style>
      .ln  { fill:none; stroke:#7CFC00; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
      .lnf { fill:none; stroke:#39c5cf; stroke-width:1.2; stroke-linecap:round; stroke-linejoin:round; opacity:0.85; }
      .fill{ fill:#7CFC00; opacity:0.08; }
      .dot { fill:#7CFC00; }
      .txt { fill:#7CFC00; font-family:'Cascadia Code',Consolas,monospace; font-size:13px; letter-spacing:3px; font-weight:bold; }
      .txt2{ fill:#8b949e; font-family:'Cascadia Code',Consolas,monospace; font-size:9px; letter-spacing:2px; }
    </style>
  </defs>

  <rect width="400" height="400" fill="#0d1117"/>
  <rect width="400" height="400" fill="url(#halo)"/>

  <!-- Colonnade grecque en arriere-plan (charge iconographique) -->
  <g class="lnf" opacity="0.35">
    <line x1="40" y1="60" x2="40" y2="340"/><line x1="70" y1="60" x2="70" y2="340"/>
    <line x1="330" y1="60" x2="330" y2="340"/><line x1="360" y1="60" x2="360" y2="340"/>
    <path d="M30 60 h50 M320 60 h50 M30 56 h50 M320 56 h50" />
    <path d="M30 340 h50 M320 340 h50" />
  </g>

  <!-- GLOBE CELESTE (porte par Atlas) -->
  <g transform="translate(200,128)">
    <circle r="86" class="ln" fill="url(#globe)"/>
    <circle r="86" class="lnf" stroke-dasharray="2 5" opacity="0.5"/>
    <ellipse rx="86" ry="30" class="lnf"/>
    <ellipse rx="86" ry="58" class="lnf" opacity="0.55"/>
    <ellipse rx="30" ry="86" class="lnf"/>
    <ellipse rx="58" ry="86" class="lnf" opacity="0.55"/>
    <!-- continents stylises -->
    <path class="lnf" d="M-40 -30 q20 -10 34 4 q10 14 -6 22 q-22 6 -30 -10 q-8 -10 2 -16 Z"/>
    <path class="lnf" d="M14 6 q24 -6 36 12 q6 20 -16 26 q-22 2 -26 -18 q-2 -14 6 -20 Z"/>
    <path class="lnf" d="M-30 36 q18 -4 26 10 q4 14 -14 18 q-18 0 -22 -14 q-2 -8 10 -14 Z"/>
    <!-- constellations -->
    <g class="dot" opacity="0.95">
      <circle cx="-46" cy="-44" r="2.4"/><circle cx="-28" cy="-54" r="2.4"/><circle cx="-6" cy="-46" r="2.4"/>
      <circle cx="22" cy="-40" r="2.4"/><circle cx="48" cy="-20" r="2.4"/><circle cx="56" cy="14" r="2.4"/>
      <circle cx="-52" cy="8" r="2.4"/><circle cx="-38" cy="40" r="2.4"/><circle cx="2" cy="50" r="2.4"/><circle cx="34" cy="46" r="2.4"/>
    </g>
    <path class="lnf" d="M-46 -44 L-28 -54 L-6 -46 L22 -40 L48 -20 L56 14 M-52 8 L-38 40 L2 50 L34 46" opacity="0.7"/>
    <line x1="0" y1="-100" x2="0" y2="100" class="lnf" stroke-dasharray="2 4"/>
  </g>

  <!-- ATLAS : silhouette athletique a genoux, portant le globe -->
  <g class="ln">
    <!-- Tete + casque corinthien stylise -->
    <path class="fill" d="M186 196 q-12 -4 -14 8 q-2 10 6 14 q-2 8 4 12 q8 4 16 -2 q8 2 12 -6 q4 -10 -2 -16 q2 -10 -8 -12 q-8 -2 -14 4 Z"/>
    <circle cx="194" cy="206" r="13"/>
    <path d="M182 200 q12 -8 24 0 M188 196 q6 -6 12 0"/>
    <!-- Cou -->
    <path d="M194 219 v12"/>
    <!-- Epaule gauche + bras levant le globe -->
    <path d="M182 232 q-22 2 -30 22 q-6 18 4 34 q10 14 24 10"/>
    <path d="M176 286 q-10 14 -6 30 q4 14 18 16"/>
    <circle cx="190" cy="332" r="6"/>
    <!-- Torse (pectoraux, abdos) -->
    <path d="M182 232 q14 10 30 4 q14 -4 16 -16 q4 -16 -4 -28"/>
    <path d="M186 256 q12 8 26 2 q10 -4 12 -14"/>
    <path d="M188 268 q14 10 30 2"/>
    <path d="M190 282 q14 8 28 0"/>
    <path d="M192 296 q12 6 24 -2"/>
    <!-- Bras droit (tendu vers le globe au-dessus) -->
    <path d="M212 230 q22 -8 30 -28 q8 -20 -2 -38"/>
    <circle cx="236" cy="160" r="6"/>
    <!-- Jambe pliee (genou au premier plan) -->
    <path d="M188 300 q-18 22 -8 44 q10 20 36 16 q22 -2 26 -22"/>
    <path d="M214 302 q20 18 16 42 q-2 18 -24 22"/>
    <!-- Pied -->
    <path d="M214 366 q14 4 28 -2 q8 -4 6 -12"/>
  </g>

  <!-- Cadre meandre (cle grecque) complet -->
  <g class="lnf" opacity="0.5">
    <path d="M16 16 h368 v368 h-368 Z"/>
    <path d="M16 30 h14 v14 h-14 v-14 M30 30 h14 v14 h-14 v-14 M44 30 h14 v14 h-14 v-14 M58 30 h14 v14 h-14 v-14 M72 30 h14 v14 h-14 v-14 M86 30 h14 v14 h-14 v-14 M100 30 h14 v14 h-14 v-14 M114 30 h14 v14 h-14 v-14 M128 30 h14 v14 h-14 v-14 M142 30 h14 v14 h-14 v-14 M156 30 h14 v14 h-14 v-14 M170 30 h14 v14 h-14 v-14 M184 30 h14 v14 h-14 v-14 M198 30 h14 v14 h-14 v-14 M212 30 h14 v14 h-14 v-14 M226 30 h14 v14 h-14 v-14 M240 30 h14 v14 h-14 v-14 M254 30 h14 v14 h-14 v-14 M268 30 h14 v14 h-14 v-14 M282 30 h14 v14 h-14 v-14 M296 30 h14 v14 h-14 v-14 M310 30 h14 v14 h-14 v-14 M324 30 h14 v14 h-14 v-14 M338 30 h14 v14 h-14 v-14 M352 30 h14 v14 h-14 v-14 M366 30 h14 v14 h-14 v-14"/>
  </g>

  <!-- Texte -->
  <text x="200" y="384" text-anchor="middle" class="txt">ΑΤΛΑΣ</text>
  <text x="200" y="396" text-anchor="middle" class="txt2">HARNAIS 2027 · CORTEX SOUVERAIN</text>
</svg>
