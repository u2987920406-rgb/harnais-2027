<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Atlas grec en wireframe — style caducee Hermes : trait fin, monochrome, geometrique -->
  <defs>
    <style>
      .ln  { fill:none; stroke:#7CFC00; stroke-width:1.4; stroke-linecap:round; stroke-linejoin:round; }
      .ln2 { fill:none; stroke:#39c5cf; stroke-width:1; stroke-linecap:round; opacity:0.8; }
      .dot { fill:#7CFC00; }
      .txt { fill:#8b949e; font-family:'Cascadia Code',Consolas,monospace; font-size:11px; letter-spacing:2px; }
    </style>
  </defs>

  <!-- Cadre meandre (cle grecque) -->
  <rect x="14" y="14" width="372" height="372" class="ln2" opacity="0.5"/>
  <g class="ln2" opacity="0.4">
    <path d="M20 28 h12 v12 h-12 v-12 M32 28 h12 v12 h-12 v-12 M44 28 h12 v12 h-12 v-12 M56 28 h12 v12 h-12 v-12 M68 28 h12 v12 h-12 v-12 M80 28 h12 v12 h-12 v-12 M92 28 h12 v12 h-12 v-12 M104 28 h12 v12 h-12 v-12 M116 28 h12 v12 h-12 v-12 M128 28 h12 v12 h-12 v-12 M140 28 h12 v12 h-12 v-12 M152 28 h12 v12 h-12 v-12 M164 28 h12 v12 h-12 v-12 M176 28 h12 v12 h-12 v-12 M188 28 h12 v12 h-12 v-12 M200 28 h12 v12 h-12 v-12 M212 28 h12 v12 h-12 v-12 M224 28 h12 v12 h-12 v-12 M236 28 h12 v12 h-12 v-12 M248 28 h12 v12 h-12 v-12 M260 28 h12 v12 h-12 v-12 M272 28 h12 v12 h-12 v-12 M284 28 h12 v12 h-12 v-12 M296 28 h12 v12 h-12 v-12 M308 28 h12 v12 h-12 v-12 M320 28 h12 v12 h-12 v-12 M332 28 h12 v12 h-12 v-12 M344 28 h12 v12 h-12 v-12 M356 28 h12 v12 h-12 v-12"/>
  </g>

  <!-- SPHERE celeste (le monde) : cercles concentriques + meridiens + constellations -->
  <g transform="translate(200,150)">
    <circle r="78" class="ln"/>
    <circle r="78" class="ln2" stroke-dasharray="3 4"/>
    <ellipse rx="78" ry="26" class="ln2"/>
    <ellipse rx="78" ry="50" class="ln2" opacity="0.6"/>
    <ellipse rx="26" ry="78" class="ln2"/>
    <ellipse rx="50" ry="78" class="ln2" opacity="0.6"/>
    <!-- constellations (points + liaisons) -->
    <g class="dot" opacity="0.9">
      <circle cx="-30" cy="-28" r="2.2"/>
      <circle cx="-14" cy="-40" r="2.2"/>
      <circle cx="6" cy="-30" r="2.2"/>
      <circle cx="28" cy="-18" r="2.2"/>
      <circle cx="40" cy="10" r="2.2"/>
      <circle cx="-40" cy="20" r="2.2"/>
      <circle cx="10" cy="40" r="2.2"/>
      <circle cx="-20" cy="44" r="2.2"/>
    </g>
    <path class="ln2" d="M-30 -28 L-14 -40 L6 -30 L28 -18 L40 10 M-40 20 L-20 44 L10 40 L40 10" opacity="0.7"/>
    <!-- axe polaire -->
    <line x1="0" y1="-90" x2="0" y2="90" class="ln2" stroke-dasharray="2 3"/>
  </g>

  <!-- Figure Atlas (wireframe : traits fins, genoux plies, bras levés) -->
  <g class="ln">
    <!-- tete -->
    <circle cx="200" cy="244" r="17"/>
    <!-- visage : nez, barbe -->
    <path d="M200 238 v14 M193 252 q7 8 14 0"/>
    <!-- cou -->
    <line x1="200" y1="261" x2="200" y2="272"/>
    <!-- torse -->
    <path d="M178 274 q22 14 44 0 L214 312 q-14 10 -28 0 Z"/>
    <!-- pectoraux / abdos (wireframe) -->
    <path d="M189 282 q11 6 22 0 M183 296 h34 M186 306 h28"/>
    <!-- bras gauche (plie, soutient la sphere) -->
    <path d="M180 278 q-34 6 -40 36 q-4 22 14 40" />
    <circle cx="154" cy="354" r="5"/>  <!-- main gauche -->
    <!-- bras droit (leve vers la sphere) -->
    <path d="M220 278 q34 -10 44 -44 q6 -22 -10 -40"/>
    <circle cx="248" cy="190" r="5"/> <!-- main droite (sur la sphere) -->
    <!-- jambe pliee (genou au premier plan) -->
    <path d="M184 312 q-20 30 -6 56 q14 20 44 16"/>
    <path d="M212 312 q22 26 16 52 q-4 18 -28 22"/>
    <!-- pied -->
    <path d="M218 382 q14 4 26 -2"/>
  </g>

  <!-- Pilier / ordre dorique (accent grec, sous Atlas) -->
  <g class="ln2" opacity="0.7">
    <line x1="150" y1="382" x2="150" y2="360"/>
    <line x1="252" y1="382" x2="252" y2="360"/>
    <rect x="142" y="356" width="116" height="6" fill="none"/>
  </g>

  <!-- Texte -->
  <text x="200" y="392" text-anchor="middle" class="txt">ΑΤΛΑΣ · HARNAIS 2027</text>
</svg>
