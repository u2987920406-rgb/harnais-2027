<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Harnais 2027</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --accent:#7CFC00; --text:#e6edf3; --muted:#8b949e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:12px 16px; border-bottom:1px solid #30363d; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:16px; margin:0; }
    .badge { font-size:12px; color:var(--accent); border:1px solid var(--accent); border-radius:6px; padding:2px 8px; }
    .layout { display:grid; grid-template-columns: 1fr 320px 320px; height: calc(100vh - 49px); }
    .skills { border-left:1px solid #30363d; padding:16px; overflow-y:auto; font-size:13px; }
    .skill-item { border:1px solid #30363d; border-radius:8px; padding:8px; margin-bottom:8px; }
    .skill-item h4 { margin:0 0 4px; font-size:13px; color:var(--accent); }
    .skill-item small { color:var(--muted); }
    .skill-form { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .skill-form input, .skill-form textarea { background:var(--panel); border:1px solid #30363d; color:var(--text); padding:8px; border-radius:6px; font-family:inherit; }
    .skill-form textarea { min-height:70px; resize:vertical; }
    .skill-form button { background:var(--accent); color:#000; border:none; padding:8px; border-radius:6px; font-weight:600; cursor:pointer; }
    .btn-apply { background:#1f6feb; color:#fff; border:none; padding:4px 8px; border-radius:6px; font-size:11px; cursor:pointer; }
    .btn-tts { background:transparent; border:none; cursor:pointer; font-size:14px; margin-top:6px; }
    .modes { display:flex; gap:4px; margin-left:auto; }
    .modes button { background:var(--panel); color:var(--muted); border:1px solid #30363d; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:500; }
    .modes button.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .approve-item { border:1px solid #30363d; border-radius:8px; padding:8px; margin-bottom:8px; }
    .approve-item small { color:var(--muted); display:block; margin:4px 0; }
    .approve-item .row { display:flex; gap:6px; }
    .approve-item .row button { flex:1; padding:6px; font-size:11px; }
    .approve-ok { background:#238636; color:#fff; }
    .approve-no { background:#da3633; color:#fff; }
    .chat { display:flex; flex-direction:column; padding:16px; gap:12px; overflow-y:auto; }
    .msg { padding:10px 12px; border-radius:10px; max-width:80%; }
    .msg.user { background:#1f6feb22; align-self:flex-end; border:1px solid #1f6feb55; }
    .msg.cortex { background:var(--panel); align-self:flex-start; border:1px solid #30363d; }
    .side { border-left:1px solid #30363d; padding:16px; overflow-y:auto; font-size:13px; }
    .metric { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #21262d; }
    .metric span:last-child { color:var(--accent); }
    form { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #30363d; }
    input { flex:1; background:var(--panel); border:1px solid #30363d; color:var(--text); padding:10px; border-radius:8px; }
    button { background:var(--accent); color:#000; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer; }
    .wm { font-size:11px; color:var(--muted); margin-top:4px; padding-left:4px; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Atlas</h1>
    <span class="badge">hy3:free · Nous</span>
    <span id="mode" class="badge">mode: …</span>
    <div class="modes" id="modes">
      <button data-mode="auto">auto</button>
      <button data-mode="plan">plan</button>
      <button data-mode="permission">permission</button>
      <button data-mode="edit">edit</button>
    </div>
  </header>
  <div class="layout">
    <div>
      <div id="chat" class="chat"></div>
      <form id="form">
        <input id="input" placeholder="Parle à Atlas…" autocomplete="off" />
        <button type="submit">Envoyer</button>
      </form>
    </div>
    <div class="side">
      <h3>État du cortex</h3>
      <div class="metric"><span>Cycles</span><span id="m-cycles">–</span></div>
      <div class="metric"><span>Ton utilisateur</span><span id="m-tone">–</span></div>
      <div class="metric"><span>Engagement</span><span id="m-engagement">–</span></div>
      <div class="metric"><span>Mémoire travail</span><span id="m-wm">–</span></div>
      <div class="metric"><span>Hypothèses</span><span id="m-hyp">–</span></div>
      <div class="metric"><span>Fils arrière-plan</span><span id="m-threads">–</span></div>
      <div class="metric"><span>Graphe (nœuds)</span><span id="m-nodes">–</span></div>
      <div class="metric"><span>Graphe (arêtes)</span><span id="m-edges">–</span></div>
      <h3>Mémoire de travail</h3>
      <div id="wm-list"></div>
    </div>
    <div class="skills">
      <h3>Approbations</h3>
      <div id="approve-list"><small style="color:var(--muted)">Aucune en attente</small></div>
      <h3>Skills</h3>
      <div class="skill-form">
        <input id="sk-name" placeholder="nom (ex: audit-secu)" />
        <input id="sk-desc" placeholder="description courte" />
        <input id="sk-tags" placeholder="tags (ex: secu, audit)" />
        <textarea id="sk-body" placeholder="contenu / instructions de la skill…"></textarea>
        <label style="font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;">
          <input type="checkbox" id="sk-strict" /> Mode STRICT (contrainte obligatoire, injectée dans le system prompt)
        </label>
        <button id="sk-create">Créer la skill</button>
      </div>
      <div id="sk-list"></div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');

    function addMsg(role, text) {
      const d = document.createElement('div');
      d.className = 'msg ' + role;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      // Bouton lecture vocale (TTS navigateur, 0 dep, souverain cote client)
      if (role === 'cortex' && 'speechSynthesis' in window) {
        const btn = document.createElement('button');
        btn.textContent = '🔊';
        btn.className = 'btn-tts';
        btn.title = 'Lire à voix haute';
        btn.addEventListener('click', () => speak(text));
        d.appendChild(btn);
      }
    }

    function speak(text) {
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'fr-FR';
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      } catch (e) { /* non supporte */ }
    }

    async function refreshState() {
      try {
        const r = await fetch('/api/state');
        const s = await r.json();
        document.getElementById('mode').textContent = 'mode: ' + s.mode;
        document.getElementById('m-cycles').textContent = s.cycles;
        document.getElementById('m-tone').textContent = s.userTone;
        document.getElementById('m-engagement').textContent = s.userEngagement?.toFixed(2);
        document.getElementById('m-wm').textContent = s.workingMemorySize;
        document.getElementById('m-hyp').textContent = s.activeHypotheses;
        document.getElementById('m-threads').textContent = s.backgroundThreads;
        document.getElementById('m-nodes').textContent = s.graph?.nodes ?? 0;
        document.getElementById('m-edges').textContent = s.graph?.edges ?? 0;
        const wm = document.getElementById('wm-list');
        wm.innerHTML = '';
        (s.workingMemory || []).forEach(w => {
          const d = document.createElement('div');
          d.className = 'wm';
          d.textContent = '• [' + w.type + '] ' + w.content;
          wm.appendChild(d);
        });
      } catch (e) { /* silence */ }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      addMsg('user', msg);
      input.value = '';

      // Affichage progressif via SSE (hy3 stream)
      const cortexMsg = document.createElement('div');
      cortexMsg.className = 'msg cortex';
      cortexMsg.textContent = '…';
      chat.appendChild(cortexMsg);
      chat.scrollTop = chat.scrollHeight;

      const resp = await fetch('/api/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg }),
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let acc = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() ?? '';
        for (const line of lines) {
          const t = line.trim();
          if (!t.startsWith('data:')) continue;
          const payload = t.slice(5).trim();
          try { acc += JSON.parse(payload); cortexMsg.textContent = acc; chat.scrollTop = chat.scrollHeight; }
          catch { /* meta/done/error */ }
        }
      }
      if (!acc) cortexMsg.textContent = '(pas de reponse en streaming — voir /api/inject)';
      refreshState();
    });

    refreshState();
    setInterval(refreshState, 5000);

    // --- Gouvernance: bascule de mode + approbations ---
    const modesBar = document.getElementById('modes');
    async function refreshMode() {
      try {
        const r = await fetch('/api/state'); const s = await r.json();
        // governanceMode n'est pas dans /api/state: on le devine via le badge mode cycle.
        // On marque actif le bouton correspondant si connu.
      } catch (e) {}
    }
    modesBar.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const mode = btn.getAttribute('data-mode');
        const res = await fetch('/api/mode', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode }) });
        const data = await res.json();
        if (data.ok) {
          modesBar.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          addMsg('cortex', '✓ Mode gouvernance: ' + mode);
        }
      });
    });
    async function loadApprovals() {
      try {
        const r = await fetch('/api/pending'); const list = await r.json();
        const el = document.getElementById('approve-list');
        if (!list.length) { el.innerHTML = '<small style="color:var(--muted)">Aucune en attente</small>'; return; }
        el.innerHTML = '';
        list.forEach(a => {
          const d = document.createElement('div'); d.className = 'approve-item';
          d.innerHTML = `<small><b>${a.tool}</b> — ${a.reason}</small><div class="row"><button class="approve-ok" data-id="${a.id}">Valider</button><button class="approve-no" data-id="${a.id}">Refuser</button></div>`;
          el.appendChild(d);
        });
        el.querySelectorAll('.approve-ok').forEach(b => b.addEventListener('click', () => resolveApproval(b.getAttribute('data-id'), true)));
        el.querySelectorAll('.approve-no').forEach(b => b.addEventListener('click', () => resolveApproval(b.getAttribute('data-id'), false)));
      } catch (e) {}
    }
    async function resolveApproval(id, ok) {
      await fetch('/api/approve/' + id, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ok }) });
      loadApprovals();
    }
    loadApprovals();
    setInterval(loadApprovals, 3000);

    // --- Panneau Skills: lister / creer / appliquer ---
    async function loadSkills() {
      try {
        const r = await fetch('/api/skills');
        const list = await r.json();
        const el = document.getElementById('sk-list');
        el.innerHTML = '';
        list.forEach(s => {
          const d = document.createElement('div');
          d.className = 'skill-item';
          const tags = (s.tags || []).map(t => '#' + t).join(' ');
          const strictBadge = s.mode === 'strict' ? ' <span style="color:#ff6b6b">[STRICT]</span>' : '';
          d.innerHTML = `<h4>${s.name}${strictBadge}</h4><small>${s.description}</small><br><small>${tags}</small>` +
            `<br><button class="btn-apply" data-name="${encodeURIComponent(s.name)}">Appliquer</button>`;
          el.appendChild(d);
        });
        el.querySelectorAll('.btn-apply').forEach(btn => {
          btn.addEventListener('click', async () => {
            const name = btn.getAttribute('data-name');
            const res = await fetch('/api/skills/' + name + '/apply', { method: 'POST' });
            const data = await res.json();
            if (data.ok) addMsg('cortex', '✓ Skill appliquée: ' + data.applied + ' (sera dans le prochain message)');
          });
        });
      } catch (e) { /* silence */ }
    }

    document.getElementById('sk-create').addEventListener('click', async () => {
      const name = document.getElementById('sk-name').value.trim();
      const description = document.getElementById('sk-desc').value.trim();
      const tags = document.getElementById('sk-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const content = document.getElementById('sk-body').value.trim();
      const mode = document.getElementById('sk-strict').checked ? 'strict' : 'soft';
      if (!name || !description || !content) { alert('nom, description et contenu requis'); return; }
      const res = await fetch('/api/skills', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description, content, tags, mode }),
      });
      const data = await res.json();
      if (data.ok) {
        addMsg('cortex', '✓ Skill créée: ' + name + ' (' + data.totalSkills + ' skills)');
        document.getElementById('sk-name').value = '';
        document.getElementById('sk-desc').value = '';
        document.getElementById('sk-tags').value = '';
        document.getElementById('sk-body').value = '';
        loadSkills();
      } else {
        addMsg('cortex', '✗ Erreur création: ' + (data.error || 'inconnue'));
      }
    });

    loadSkills();
  </script>
</body>
</html>
