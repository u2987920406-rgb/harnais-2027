name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc strict)
        run: npm run build

      - name: Test (node:test)
        run: npm test

# Note: les smoke tests live (npm run smoke, smoke:workflow, smoke:verifier,
# smoke:cortex) exigent un daemon Ollama et ne tournent PAS en CI.
# Ils se lancent manuellement en local: npm run smoke:cortex
